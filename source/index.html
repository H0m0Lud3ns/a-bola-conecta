    <div id="root"></div>
    <a class="copa-gondwana-shortcut" href="/copa-2026/" aria-label="Abrir Copa de Gondwana 2026">
      <span><small>Copa 2026</small><strong>Fichas Seleções Gondwana</strong></span><b>IR</b>
    </a>
    <script>
      // Instagram Placement - injeta CSS apos React renderizar
      (function(){
        function applyIgStyle(){
          var ig=document.querySelector('a[aria-label="Instagram"]');
          if(ig){
            ig.style.cssText='background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)!important;box-shadow:0 4px 24px rgba(131,58,180,.45)!important;transform:scale(1.08);border:none!important;color:#fff!important';
            ig.addEventListener('mouseenter',function(){this.style.transform='scale(1.15)';this.style.boxShadow='0 8px 32px rgba(131,58,180,.6)!important'});
            ig.addEventListener('mouseleave',function(){this.style.transform='scale(1.08)';this.style.boxShadow='0 4px 24px rgba(131,58,180,.45)!important'});
          }
        }
        if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',applyIgStyle)}
        else{applyIgStyle()}
        setTimeout(applyIgStyle,1500);
      })();
      // Inject Copa 2026 into nav menus
      (function(){
        function injectCopaNav(){
          var links=document.querySelectorAll('header nav a, header nav a[href]');
          // Target both desktop and mobile nav
          var navs=document.querySelectorAll('header nav');
          navs.forEach(function(nav){
            if(nav.querySelector('a[href*="copa-2026"]')) return; // already injected
            var cont=nav.querySelector('a[href*="/contato"]');
            var a=document.createElement('a');
            a.href='/a-bola-conecta/copa-2026/';
            a.textContent='Copa 2026';
            a.style.cssText='order:99!important;color:#121611!important;background:#d9ff6f!important;border:1px solid rgba(217,255,111,.75)!important;box-shadow:0 0 22px rgba(217,255,111,.28)!important;font-weight:900!important;border-radius:999px;padding:8px 14px!important;text-decoration:none!important;font-size:14px!important;display:inline-flex!important;align-items:center!important';
            if(cont){cont.parentNode.insertBefore(a,cont.nextSibling);}
            else{nav.appendChild(a);}
          });
        }
        if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){setTimeout(injectCopaNav,800)})}
        else{setTimeout(injectCopaNav,800)}
        setTimeout(injectCopaNav,2000);
        setTimeout(injectCopaNav,3500);
      })();
    </script>
  
    <script id="gondwana-fc-palette-enforcer">
      (function(){
        function applyGondwanaPalette(){
          var gf = {
            grafite: '#11130F',
            areia: '#F6EDD7',
            ouro: '#F2C230',
            barro: '#9E4A2F',
            verde: '#2E6F46',
            azul: '#17243A'
          };
          // Botão Copa 2026 do menu — seletor por href
          document.querySelectorAll('header nav a[href*="/copa-2026"]').forEach(function(a){
            a.style.setProperty('background', gf.ouro, 'important');
            a.style.setProperty('color', gf.grafite, 'important');
            a.style.setProperty('border-color', gf.ouro, 'important');
            a.style.setProperty('box-shadow', '0 0 22px rgba(242, 194, 48, .35)', 'important');
          });
          // Atalho flutuante Copa — substituir verde neon por ouro
          var shortcut = document.querySelector('.copa-gondwana-shortcut');
          if(shortcut){
            shortcut.style.setProperty('background', gf.grafite, 'important');
            shortcut.style.setProperty('color', gf.areia, 'important');
            shortcut.style.setProperty('border-color', gf.ouro, 'important');
            var small = shortcut.querySelector('small');
            if(small) small.style.setProperty('color', gf.ouro, 'important');
            var b = shortcut.querySelector('b');
            if(b){
              b.style.setProperty('background', gf.ouro, 'important');
              b.style.setProperty('color', gf.grafite, 'important');
            }
          }
          // Botão Instagram — substituir gradiente magenta por barro/azul
          document.querySelectorAll('a[aria-label="Instagram"]').forEach(function(a){
            a.style.setProperty('background', 'linear-gradient(135deg, ' + gf.barro + ', ' + gf.azul + ')', 'important');
            a.style.setProperty('background-image', 'linear-gradient(135deg, ' + gf.barro + ', ' + gf.azul + ')', 'important');
            a.style.setProperty('color', gf.areia, 'important');
            a.style.setProperty('box-shadow', '0 4px 24px rgba(158, 74, 47, .35)', 'important');
          });
        }
        // Aplicar imediatamente
        applyGondwanaPalette();
        // Aplicar depois do DOMContentLoaded
        if(document.readyState === 'loading'){
          document.addEventListener('DOMContentLoaded', applyGondwanaPalette);
        }
        // Aplicar após window load (React terminou de hidratar)
        window.addEventListener('load', applyGondwanaPalette);
        // Aplicar em intervals para garantir (React pode re-renderizar)
        setInterval(applyGondwanaPalette, 500);
      })();
    </script>
